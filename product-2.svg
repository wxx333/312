<svg width="1920" height="900" viewBox="0 0 1920 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CFC9BC"/>
      <stop offset="1" stop-color="#BEB6A8"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1920" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8B58A"/>
      <stop offset="1" stop-color="#C59A6B"/>
    </linearGradient>
    <linearGradient id="sofa" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#D9DBDF"/>
      <stop offset="1" stop-color="#BFC3C9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- wall -->
  <rect width="1920" height="900" fill="url(#wall)"/>
  <g opacity="0.12">
    <path d="M0 120H1920" stroke="#000000" stroke-width="2"/>
    <path d="M0 240H1920" stroke="#000000" stroke-width="2"/>
    <path d="M0 360H1920" stroke="#000000" stroke-width="2"/>
    <path d="M0 480H1920" stroke="#000000" stroke-width="2"/>
  </g>

  <!-- cabinet -->
  <g filter="url(#shadow)">
    <rect x="150" y="520" width="780" height="200" rx="10" fill="url(#wood)"/>
    <rect x="150" y="520" width="780" height="200" rx="10" fill="#000000" opacity="0.04"/>
    <path d="M540 520V720" stroke="#000000" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <!-- decor -->
  <g filter="url(#shadow)">
    <rect x="520" y="420" width="70" height="110" rx="10" fill="#FFFFFF" opacity="0.75"/>
    <rect x="610" y="452" width="92" height="78" rx="16" fill="#7F56D9" opacity="0.55"/>
    <rect x="720" y="468" width="62" height="62" rx="31" fill="#FFFFFF" opacity="0.65"/>
  </g>
  <path d="M784 442c14-28 44-44 72-40 22 4 40 22 40 46 0 30-26 56-62 64" stroke="#2F6F44" stroke-width="6" opacity="0.8"/>

  <!-- sofa -->
  <g filter="url(#shadow)">
    <rect x="980" y="520" width="820" height="250" rx="34" fill="url(#sofa)"/>
    <rect x="1040" y="458" width="340" height="110" rx="30" fill="url(#sofa)"/>
    <rect x="1400" y="458" width="350" height="110" rx="30" fill="url(#sofa)"/>
    <rect x="1120" y="596" width="260" height="150" rx="26" fill="#101828" opacity="0.62"/>
  </g>
</svg>
