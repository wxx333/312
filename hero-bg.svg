<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Магазин</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <header class="header">
          <div class="header__inner">
            <a class="logo" href="#" aria-label="На главную">Интерьер.</a>

            <nav class="nav" aria-label="Навигация">
              <a class="nav__link" href="#products">Каталог</a>
              <a class="nav__link" href="#cart">Корзина</a>
            </nav>
          </div>
        </header>

        <div class="hero__content">
          <h1 class="hero__title">Всё, чего<br />заслуживает ваш дом</h1>
          <p class="hero__text">Наша мебель — ваше отражение</p>
          <a class="hero__link" href="#products">Перейти в каталог</a>
        </div>
      </section>

      <section class="products" id="products">
        <div class="center">
          <h2 class="products__title">Каталог товаров</h2>

          <div class="product-grid">
            <article class="product-card">
              <img
                class="product-card__img"
                src="./image/22dceb951f3bd0dcd2be27f1ecd307d120ff3a8c.jpg"
                alt="Кровать TATRAN"
              />
              <h3 class="product-card__title">Кровать TATRAN</h3>
              <p class="product-card__text">
                Основание из натуральной древесины обеспечивает стабильность и
                идеальную геометрию.
              </p>
              <p class="product-card__price">120 000 руб.</p>
            </article>

            <article class="product-card">
              <img
                class="product-card__img"
                src="./image/8cf283e47a4546775bf43d4cb27cb383000923a5.jpg"
                alt="Кресло VILORA"
              />
              <h3 class="product-card__title">Кресло VILORA</h3>
              <p class="product-card__text">
                Мягкое и уютное, аккуратные линии. Упругие подушки сиденья для
                приятных вечеров.
              </p>
              <p class="product-card__price">21 000 руб.</p>
            </article>

            <article class="product-card">
              <img
                class="product-card__img"
                src="./image/87eb9c456e73bf668dae3477338a20de3a8e3ecd.jpg"
                alt="Стол MENU"
              />
              <h3 class="product-card__title">Стол MENU</h3>
              <p class="product-card__text">
                Для тех, кто ценит практичность. Идеален как обеденный стол,
                рабочий или письменный.
              </p>
              <p class="product-card__price">34 000 руб.</p>
            </article>

            <article class="product-card">
              <img
                class="product-card__img"
                src="./image/b9a846e35745b0bafbae628803e90754a1ac88a2.jpg"
                alt="Кресло ASKETSA"
              />
              <h3 class="product-card__title">Кресло ASKETSA</h3>
              <p class="product-card__text">
                Высококачественный пенополиуретан в «подушке» сохраняет
                комфортные формы годами.
              </p>
              <p class="product-card__price">68 000 руб.</p>
            </article>

            <article class="product-card">
              <img
                class="product-card__img"
                src="./image/a786ec1803cfdd24fe6df8c3888e07922f10e539.jpg"
                alt="Стол NORMAN"
              />
              <h3 class="product-card__title">Стол NORMAN</h3>
              <p class="product-card__text">
                Прекрасно переносит солнечные лучи, перепады температур и
                повышенную влажность.
              </p>
              <p class="product-card__price">40 000 руб.</p>
            </article>

            <article class="product-card">
              <img
                class="product-card__img"
                src="./image/8768c853b0c588bb91e4eddceaf0e5a2c92d84f7.jpg"
                alt="Диван NASTAN"
              />
              <h3 class="product-card__title">Диван NASTAN</h3>
              <p class="product-card__text">
                Модель отличается простотой линий и форм, отсутствием броского
                декора.
              </p>
              <p class="product-card__price">80 000 руб.</p>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="center footer__inner">
        <p class="footer__text">сделал кустов алексей</p>
      </div>
    </footer>
  </body>
</html>

